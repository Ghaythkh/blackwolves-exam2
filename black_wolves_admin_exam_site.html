<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختبار إدارة Black Wolves</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
color:white;
margin:0;
padding:0;
}
.header{
text-align:center;
padding:30px;
background:#000;
border-bottom:3px solid #2ecc71;
}
.header h1{margin:0;font-size:32px}
.container{
max-width:900px;
margin:auto;
padding:30px;
}
.card{
background:#1e1e1e;
padding:25px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}
.question{margin-bottom:15px}
label{display:block;margin:5px 0;cursor:pointer}
input[type="text"]{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:5px;
}
button{
background:#2ecc71;
border:none;
padding:14px 25px;
border-radius:8px;
font-size:18px;
color:white;
cursor:pointer;
margin-top:20px;
}
button:hover{background:#27ae60}
.result{
text-align:center;
font-size:26px;
margin-top:30px;
}
.pass{color:#2ecc71}
.fail{color:#e74c3c}
</style>
</head>

<body>

<div class="header">
<h1>امتحان الإدارة | Black Wolves</h1>
<p>العلامة النهائية 200</p>
</div>

<div class="container">

<div class="card">
<h2>معلومات اللاعب</h2>
<label>اسم اللاعب</label>
<input type="text" id="playerName" required>

<label>ID داخل السيرفر</label>
<input type="text" id="playerID" required>
</div>

<form id="quizForm"></form>

<div style="text-align:center">
<button onclick="finishExam()">إنهاء الامتحان</button>
</div>

<div class="result" id="result"></div>

</div>

<script>

const questions=[
"ما معنى RP؟",
"ما معنى RDM؟",
"ما معنى VDM؟",
"ما معنى LAR؟",
"هل يسمح استخدام الهاك؟",
"هل يسمح نشر سيرفرات أخرى؟",
"هل يسمح السب والشتم؟",
"هل يسمح قتل المسعفين؟",
"هل يسمح الخروج من السيرفر عند القبض عليك؟",
"هل المنطقة الخضراء آمنة؟",
"هل يسمح إطلاق النار داخل المدينة؟",
"هل يجب التبليغ عن القلتش؟",
"هل يسمح سرقة سيارات المسعفين؟",
"هل يسمح الانعاش بالمناطق الخطرة؟",
"هل يسمح التدخل بمشكلة اداري اخر؟",
"هل يسمح سحب مواطن بدون سبب؟",
"هل يسمح سجن المواطن بدون دليل؟",
"هل يسمح لعب رول بلاي وانت مسجل ادارة؟",
"هل يسمح تهديد مواطن بالسجن لسبب شخصي؟",
"هل يسمح حل مشكلة لصديقك؟",
"هل يجب احترام الادمن؟",
"هل يسمح التدخل بقسم ليس قسمك؟",
"هل يجب سماع الطرفين بالمشكلة؟",
"هل يسمح التفاخر بالرتبة الادارية؟",
"هل يسمح دخول فعالية بدون اذن؟",
"هل يسمح سجن اكثر من 20 شهر؟",
"هل يسمح نشر الحسابات الشخصية؟",
"هل يسمح السبام بالشات؟",
"هل يسمح تشغيل برامج تعديل الصوت؟",
"هل يسمح تشغيل الاغاني بأي وقت؟",
"هل يسمح سرقة المدرعات الحكومية؟",
"هل يسمح سرقة السيارات العسكرية من داخل المقر؟",
"هل يسمح القتل بالمنطقة المهجورة؟",
"هل يسمح طلب ادمن بدون دليل؟",
"هل يسمح التفحيط بالفعاليات؟",
"هل يسمح دخول كراج التعديل أثناء المطاردة؟",
"هل يسمح التحدث وانت ميت؟",
"هل يسمح محاسبة اداري اخر؟",
"هل يسمح التدخل بقرارات الادارة العليا؟",
"هل يجب التواجد بالدعم الفني وانت مسجل ادارة؟"
];

const correct=[
"نعم","نعم","نعم","نعم",
"لا","لا","لا","لا","لا","نعم",
"لا","نعم","لا","لا","لا","لا","لا","لا","لا","لا",
"نعم","لا","نعم","لا","لا","لا","لا","لا","لا","لا",
"لا","لا","نعم","لا","لا","لا","لا","لا","لا","نعم"
];

const form=document.getElementById("quizForm");

questions.forEach((q,i)=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="question">
<p>${i+1}) ${q}</p>
<label><input type="radio" name="q${i}" value="نعم"> نعم</label>
<label><input type="radio" name="q${i}" value="لا"> لا</label>
</div>`;

form.appendChild(card);
});

function finishExam(){

let name=document.getElementById("playerName").value;
let id=document.getElementById("playerID").value;

if(name==""||id==""){
alert("اكتب اسمك و ID اولاً");
return;
}

let score=0;

questions.forEach((q,i)=>{
let answer=document.querySelector(`input[name=q${i}]:checked`);

if(answer && answer.value===correct[i]){
score+=5;
}
});

let finalScore=score;

let status="";

if(finalScore>=160){
status=`<span class='pass'>✔ ناجح</span>`;
}else{
status=`<span class='fail'>✖ راسب</span>`;
}

document.getElementById("result").innerHTML=`
النتيجة: ${finalScore} / 200 <br><br> ${status}
`;

saveResult(name,id,finalScore);
}

function saveResult(name,id,score){

let data={
name:name,
id:id,
score:score,
date:new Date().toLocaleString()
};

let results=JSON.parse(localStorage.getItem("bw_exam_results")||"[]");
results.push(data);

localStorage.setItem("bw_exam_results",JSON.stringify(results));

console.log("Saved result",data);
}

</script>

</body>
</html>
